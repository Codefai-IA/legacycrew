    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            /* Orange gradient background */
            background: linear-gradient(180deg, #CC5500 0%, #E87A00 100%);
            /* Background texture - subtle diagonal pattern */
            background-image: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 1px,
                rgba(255, 255, 255, 0.05) 1px,
                rgba(255, 255, 255, 0.05) 2px
            );
        }

        /* Background radial glow */
        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: 1;
            pointer-events: none;
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 60px 20px 40px;
        }

        /* Logo zone - MUITO MAIOR */
        .logo-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 800px;
            position: relative;
            margin-bottom: 80px;
            /* Fade-in animation */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out 0.2s forwards;
        }

        /* White glow behind logo - maior para a nova logo */
        .logo-zone::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 400px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(255, 255, 255, 0.2) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: -1;
        }

        .logo-container {
            position: relative;
            /* Subtle pulse glow animation */
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        .logo {
            /* LOGO MUITO MAIOR - 300px no desktop */
            max-height: 300px;
            max-width: 300px;
            width: auto;
            height: auto;
            filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.4));
            transition: all 0.3s ease;
        }

        /* Video section - ajustado para novo layout */
        .video-section {
            width: 100%;
            max-width: 720px;
            margin-bottom: 0px;
            /* Fade-in animation */
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            border-radius: 16px;
            overflow: hidden;
            /* Deep shadow and border */
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: #000;
            /* Subtle float animation */
            animation: floatVideo 3s ease-in-out infinite;
            transition: transform 0.3s ease;
        }

        .video-container:hover {
            transform: scale(1.05);
        }

        /* Video iframe/element */
        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
        }

        /* Video placeholder */
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            color: #FFF5E6;
            text-align: center;
            padding: 40px 20px;
        }

        /* Custom play button */
        .play-button {
            width: 80px;
            height: 80px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            cursor: pointer;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .play-button:hover {
            transform: scale(1.1);
        }

        .play-icon {
            width: 0;
            height: 0;
            border-left: 25px solid #CC5500;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            margin-left: 5px;
        }

        .placeholder-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #FFFFFF;
        }

        .placeholder-text {
            font-size: 14px;
            color: #FFF5E6;
            opacity: 0.8;
            line-height: 1.5;
        }

        /* Footer strip */
        .footer-strip {
            margin-top: auto;
            padding: 30px 0;
            text-align: center;
            color: #FFFFFF;
            font-size: 12px;
            opacity: 0.6;
            font-weight: 400;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulseGlow {
            from {
                filter: drop-shadow(0 6px 20px rgba(0, 0, 0, 0.4));
                opacity: 0.9;
            }
            to {
                filter: drop-shadow(0 8px 30px rgba(0, 0, 0, 0.5));
                opacity: 1;
            }
        }

        @keyframes floatVideo {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-4px);
            }
        }

        /* Mobile responsive - LOGO 40% DA TELA */
        @media (max-width: 768px) {
            .main-container {
                padding: 40px 15px 30px;
            }

            .logo-zone {
                margin-bottom: 60px;
            }

            .logo {
                /* 40% da largura da tela no mobile */
                max-width: 40vw;
                max-height: 40vw;
                min-width: 150px;  /* mínimo para não ficar muito pequeno */
                min-height: 150px;
            }

            .logo-zone::before {
                width: 300px;
                height: 250px;
            }

            .video-section {
                width: 95vw;
                margin-bottom: 0px;
            }

            .video-container {
                border-radius: 12px;
            }

            .play-button {
                width: 60px;
                height: 60px;
            }

            .play-icon {
                border-left: 18px solid #CC5500;
                border-top: 12px solid transparent;
                border-bottom: 12px solid transparent;
            }

            .placeholder-title {
                font-size: 16px;
            }

            .placeholder-text {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 30px 10px 20px;
            }

            .logo {
                /* 40% da largura da tela em telas muito pequenas */
                max-width: 40vw;
                max-height: 40vw;
                min-width: 120px;  /* mínimo absoluto */
                min-height: 120px;
            }

            .logo-zone {
                margin-bottom: 50px;
            }

            .video-section {
                width: 95vw;
            }

            .placeholder-title {
                font-size: 15px;
            }

            .placeholder-text {
                font-size: 12px;
            }
        }

        /* High contrast accessibility */
        @media (prefers-contrast: high) {
            .video-container {
                border: 2px solid rgba(255, 255, 255, 0.4);
            }
        }

        /* Reduced motion accessibility */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    
        /* Seção de Redes Sociais e Cadastro */
        .social-container {
            position: relative;
            z-index: 2;
            margin: 0px auto 0px;
            max-width: 400px;
            text-align: center;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out 0.6s forwards;
        }

        .social-links {
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 25px;
        }

        .social-title {
            color: #1a1a1a;
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 20px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .social-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .social-icon svg {
            width: 24px;
            height: 24px;
            fill: white;
            z-index: 2;
            position: relative;
        }

        .social-icon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 12px;
            transition: all 0.3s ease;
            z-index: 1;
        }

        .social-icon.facebook::before {
            background: linear-gradient(135deg, #1877F2, #42A5F5);
        }

        .social-icon.youtube::before {
            background: linear-gradient(135deg, #FF0000, #FF6B6B);
        }

        .social-icon.instagram::before {
            background: linear-gradient(135deg, #E4405F, #FCCC63, #833AB4);
        }

        .social-icon:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .social-icon:active {
            transform: translateY(-1px) scale(1.02);
        }

        /* Cadastro Section */
        .cadastro-section {

            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            padding: 25px;
        }

        .cadastro-text {
            color: #1a1a1a;
            font-size: 1em;
            margin-bottom: 20px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            line-height: 1.4;
        }

        .cadastro-btn {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B35, #F7931E);
            color: white;
            text-decoration: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1em;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .cadastro-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 53, 0.6);
            background: linear-gradient(135deg, #FF8559, #FFB84D);
        }

        .cadastro-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        /* Responsivo para mobile */
        @media (max-width: 768px) {
            Hpx 15px 10px;
